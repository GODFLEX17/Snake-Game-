name: Build-APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev openjdk-17-jdk autoconf automake libtool pkg-config zlib1g-dev libasound2-dev libpulse-dev unzip zip
          pip install --upgrade pip
          pip install "cython<3.0.0" wheel
          pip install git+https://github.com/kivy/buildozer.git@master

      - name: Run Buildozer Build
        run: |
          buildozer android debug
          
